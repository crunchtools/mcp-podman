name: Feature Request
description: Suggest a new tool or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I need to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the tool or change you'd like
      placeholder: |
        Tool name: `do_something`
        Podman API endpoint: `POST /v5.0.0/libpod/...`
        Parameters: ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: dropdown
    id: scope
    attributes:
      label: Tool Category
      options:
        - Containers
        - Images
        - Pods
        - Networks
        - Volumes
        - System
        - New Category
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information or Podman API docs links
